name: 'Store Conan Cache'
description: 'Builds package list from graph and persists to GitHub cache'
inputs:
  key_prefix:
    description: 'Cache prefix'
    required: true
    default: 'Deps'
runs:
  using: "composite"
  steps:
    - name: Save Conan Package List
      shell: bash
      run: |
        pkgfiles=()
        for state in build cache; do
          f="${HOME}/pkglist_${state}.json"
          conan list --graph ~/build.json --graph-binaries="${state}" --format=json > "${f}"
          pkgfiles+=("${f}")
        done
        python3 -c "
import json, pathlib, os, sys
merged = {}
for f in sys.argv[1:]:
    try:
        lc = json.loads(pathlib.Path(f).read_text()).get('Local Cache', {})
        for pkg, revs in lc.items():
            merged.setdefault(pkg, {}).update(revs)
    except Exception:
        pass
pathlib.Path(os.path.expanduser('~/pkglist.json')).write_text(json.dumps({'Local Cache': merged}))
" -- "${pkgfiles[@]}"
        conan cache save --no-source --file ~/conan_cache_save.tgz -l ~/pkglist.json

    - name: Save Cache
      uses: actions/cache/save@v4
      with:
        path: |
          ~/conan_cache_save.tgz
        key: ${{ inputs.key_prefix }}-${{ hashFiles('conanfile.py', '3rd_party/**/conanfile.py') }}
