name: 'Store Conan Cache'
description: 'Builds package list from graph and persists to GitHub cache'
inputs:
  key_prefix:
    description: 'Cache prefix'
    required: true
    default: 'Deps'
runs:
  using: "composite"
  steps:
    - name: Save Conan Package List
      shell: bash
      run: |
        pkgfiles=()
        for state in build cache; do
          f="${HOME}/pkglist_${state}.json"
          conan list --graph ~/build.json --graph-binaries="${state}" --format=json > "${f}"
          pkgfiles+=("${f}")
        done
        python3 -c "import json,pathlib,os,sys; m={}; [m.setdefault(p,{}).update(r) for f in sys.argv[1:] if pathlib.Path(f).exists() for p,r in json.loads(pathlib.Path(f).read_text()).get('Local Cache',{}).items()]; pathlib.Path(os.path.expanduser('~/pkglist.json')).write_text(json.dumps({'Local Cache':m}))" -- "${pkgfiles[@]}"
        conan cache save --no-source --file ~/conan_cache_save.tgz -l ~/pkglist.json

    - name: Save Cache
      uses: actions/cache/save@v4
      with:
        path: |
          ~/conan_cache_save.tgz
        key: ${{ inputs.key_prefix }}-${{ hashFiles('conanfile.py', '3rd_party/**/conanfile.py') }}
