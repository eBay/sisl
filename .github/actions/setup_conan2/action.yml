name: 'Setup Conan v2'
description: 'Sets up Conan v2 for Sisl v14+ Builds'
inputs:
  platform:
    description: 'Platform conan will be building on'
    required: true
    default: 'ubuntu-24.04'
  compiler:
    description: 'Compiler to use (gcc or clang)'
    required: false
    default: 'gcc'
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Setup Conan and Export Recipes
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install conan~=2.0
        python -m pip install gcovr
        conan profile detect --name default

    - name: Fixup GCC profile
      shell: bash
      run: |
        sed -i 's,compiler.libcxx=libstdc++$,compiler.libcxx=libstdc++11,g' ~/.conan2/profiles/default
        sed -i 's,compiler.cppstd=.*$,compiler.cppstd=gnu23,g' ~/.conan2/profiles/default
      if: ${{ inputs.compiler == 'gcc' && inputs.platform == 'ubuntu-24.04' }}

    - name: Install Clang
      shell: bash
      run: |
        sudo apt-get install -y clang-18 libc++-18-dev libc++abi-18-dev
      if: ${{ inputs.compiler == 'clang' }}

    - name: Fixup Clang profile
      shell: bash
      run: |
        CC=clang-18 CXX=clang++-18 conan profile detect --name default --force
        sed -i 's,compiler.libcxx=.*$,compiler.libcxx=libc++,g' ~/.conan2/profiles/default
        sed -i 's,compiler.cppstd=.*$,compiler.cppstd=gnu23,g' ~/.conan2/profiles/default
      if: ${{ inputs.compiler == 'clang' }}
