name: Sisl v13 Build

on:
  workflow_dispatch:
  push:
    branches:
      - stable/v13.x
  pull_request:
    branches:
      - stable/v13.x

jobs:
  GccThreadSanitize:
    uses: ./.github/workflows/build_dependencies.yml
    with:
      platform: "ubuntu-24.04"
      branch: ${{ github.ref }}
      build-type: "Debug"
      malloc-impl: "libc"
      sanitize: "thread"
      tooling: "None"
      testing: 'True'

  GccAddressSanitize:
    uses: ./.github/workflows/build_dependencies.yml
    with:
      platform: "ubuntu-24.04"
      branch: ${{ github.ref }}
      build-type: "Debug"
      malloc-impl: "libc"
      sanitize: "address"
      tooling: "None"
      testing: 'True'

  GccCoverage:
    uses: ./.github/workflows/build_dependencies.yml
    with:
      platform: "ubuntu-24.04"
      branch: ${{ github.ref }}
      build-type: "Debug"
      malloc-impl: "libc"
      sanitize: "False"
      tooling: "Coverage"
      testing: 'True'

  GccRelease:
    uses: ./.github/workflows/build_dependencies.yml
    with:
      platform: "ubuntu-24.04"
      branch: ${{ github.ref }}
      build-type: "Release"
      malloc-impl: "tcmalloc"
      sanitize: "False"
      tooling: "None"
      testing: 'True'

  ChainBuild:
    runs-on: "ubuntu-24.04"
    steps:
    - name: Start IOManager Build
      run: |
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.CHAIN_BUILD_TOKEN }}"\
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/eBay/iomanager/actions/workflows/merge_build.yml/dispatches \
          -d '{"ref":"stable/v12.x","inputs":{}}'
      if: ${{ github.ref == 'refs/heads/stable/v13.x' }}
    - name: Start NuraftMesg Build
      run: |
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.CHAIN_BUILD_TOKEN }}"\
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/eBay/nuraft_mesg/actions/workflows/conan_build.yml/dispatches \
          -d '{"ref":"stable/v4.x","inputs":{}}'
      if: ${{ github.ref == 'refs/heads/stable/v13.x' }}
