name: sisl Build

on:
  workflow_call:
    inputs:
      platform:
        required: false
        default: 'ubuntu-24.04'
        type: string
      branch:
        required: true
        type: string
      build-type:
        required: true
        type: string
      malloc-impl:
        required: true
        type: string
      sanitize:
        required: false
        type: string
        default: 'False'
      tooling:
        required: false
        type: string
        default: 'None'
      compiler:
        required: false
        type: string
        default: 'gcc'
      conan-channel:
        required: false
        type: string
        default: ''
      testing:
        required: false
        type: string
        default: 'False'
  workflow_dispatch:
    inputs:
      platform:
        required: true
        type: choice
        options:
          - ubuntu-24.04
        default: 'ubuntu-24.04'
      branch:
        required: true
        type: string
      build-type:
        required: true
        type: choice
        options:
          - Debug
          - Release
          - RelWithDebInfo
      malloc-impl:
        description: 'Allocation Library'
        required: true
        type: choice
        options:
          - libc
          - tcmalloc
          - jemalloc
      sanitize:
        description: 'Sanitizer'
        required: false
        type: choice
        options:
          - 'False'
          - 'address'
          - 'thread'
        default: 'False'
      tooling:
        required: false
        type: choice
        options:
          - 'Coverage'
          - 'None'
        default: 'None'
      compiler:
        description: 'Compiler'
        required: false
        type: choice
        options:
          - gcc
          - clang
        default: 'gcc'
      conan-channel:
        description: 'Conan channel (e.g. dev). Leave empty for stable builds with no user/channel.'
        required: false
        type: string
        default: ''
      testing:
        description: 'Build and Run'
        required: true
        type: choice
        options:
          - 'True'
          - 'False'
        default: 'True'

jobs:
  BuildSislDeps:
    runs-on: ${{ inputs.platform }}
    steps:
    - name: Retrieve Code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}
      if: ${{ inputs.testing == 'True' }}

    - name: Retrieve Recipe
      uses: actions/checkout@v4
      with:
        repository: eBay/sisl
        ref: ${{ inputs.branch }}
      if: ${{ inputs.testing == 'False' }}

    - name: Setup Conan
      uses: ./.github/actions/setup_conan2
      with:
        platform: ${{ inputs.platform }}
        compiler: ${{ inputs.compiler }}

    - name: Load Conan Cache
      id: restore-cache
      uses: ./.github/actions/load_conan2
      with:
        testing: ${{ inputs.testing }}
        key_prefix: SislDeps14-${{ inputs.platform }}-${{ inputs.build-type }}-${{ inputs.malloc-impl }}-${{ inputs.compiler }}

    - name: Prepare Recipes
      run: |
        ./prepare_v2.sh
      if: ${{ inputs.testing == 'True' || steps.restore-cache.outputs.cache-hit != 'true' }}

    - name: Build Cache
      run: |
        conan install \
            -o sisl/*:malloc_impl=${{ inputs.malloc-impl }} \
            -s:h build_type=${{ inputs.build-type }} \
            --format=json \
            --build missing \
            . > ~/build.json
      if: ${{ steps.restore-cache.outputs.cache-hit != 'true' }}

    - name: Save Conan Cache
      uses: ./.github/actions/store_conan2
      with:
        key_prefix: SislDeps14-${{ inputs.platform }}-${{ inputs.build-type }}-${{ inputs.malloc-impl }}-${{ inputs.compiler }}
      if: ${{ github.event_name != 'pull_request' && steps.restore-cache.outputs.cache-hit != 'true' }}

    - name: Create and Test Package
      run: |
        conan create \
            -o sisl/*:malloc_impl=${{ inputs.malloc-impl }} \
            -o sisl/*:sanitize=${{ inputs.sanitize }} \
            -s:h build_type=${{ inputs.build-type }} \
            ${{ inputs.conan-channel != '' && format('--user oss --channel {0}', inputs.conan-channel) || '' }} \
            --build missing \
            .
      if: ${{ inputs.testing == 'True' && inputs.tooling != 'Coverage' }}

    - name: Code Coverage Run
      run: |
        conan install \
            -o sisl/*:malloc_impl=${{ inputs.malloc-impl }} \
            -o sisl/*:coverage=True \
            -s:h build_type=${{ inputs.build-type }} \
            --build missing \
            .
        conan build \
            -o sisl/*:malloc_impl=${{ inputs.malloc-impl }} \
            -o sisl/*:coverage=True \
            -s:h build_type=${{ inputs.build-type }} \
            .
        gcovr --cobertura ./coverage.xml
      if: ${{ inputs.testing == 'True' && inputs.tooling == 'Coverage' }}

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: szmyd/sisl
        files: ./coverage.xml
        disable_search: true
      if: ${{ inputs.testing == 'True' && inputs.tooling == 'Coverage' }}
